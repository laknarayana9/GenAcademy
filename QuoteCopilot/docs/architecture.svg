<text x="1074" y="466" font-size="10" text-anchor="middle" fill="#46607A">deterministic fallback</text>
<path d="M984 432 C972 432 968 450 952 450" stroke="#2E5496" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#aB)"/>

