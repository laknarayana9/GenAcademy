<svg viewBox="0 0 1180 960" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="t d">
<title id="t">QuoteCopilot system architecture</title>
<desc id="d">A Streamlit UI calls a FastAPI backend that drives a LangGraph orchestrator of four subgraphs (intake, enrichment, assessment, packaging) over eight agents, using deterministic rules, rating and hybrid RAG tools, a switchable LLM factory, two SQLite stores, and a human review queue.</desc>
<defs>
<marker id="aB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#1F4E79"/></marker>
<marker id="aT" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#1B7A6B"/></marker>
<marker id="aA" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#B5762E"/></marker>
</defs>

<text x="40" y="40" font-size="22" font-weight="700" fill="#1F4E79">QuoteCopilot — System Architecture</text>
<text x="40" y="60" font-size="12" fill="#667">Multi-agent HO3 underwriting review · LangGraph + hybrid RAG + deterministic rules + human-in-the-loop</text>

<!-- legend -->
<g font-size="11" fill="#1A2A3A">
<rect x="836" y="26" width="14" height="14" rx="3" fill="#EAF1F8" stroke="#2E5496"/><text x="856" y="37">Agentic / LLM-assisted</text>
<rect x="836" y="46" width="14" height="14" rx="3" fill="#E3F2EE" stroke="#1B7A6B"/><text x="856" y="57">Deterministic / data</text>
<rect x="1010" y="26" width="14" height="14" rx="3" fill="#FBEFD9" stroke="#B5762E"/><text x="1030" y="37">Human-in-the-loop</text>
<rect x="1010" y="46" width="14" height="14" rx="3" fill="#EEEEEE" stroke="#777"/><text x="1030" y="57">State / persistence</text>
</g>

<!-- actors -->
