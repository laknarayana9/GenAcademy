<rect x="360" y="74" width="140" height="40" rx="6" fill="#FFFFFF" stroke="#2E5496"/><text x="430" y="99" fill="#1A2A3A">Underwriter</text>
<rect x="520" y="74" width="140" height="40" rx="6" fill="#FFFFFF" stroke="#2E5496"/><text x="590" y="99" fill="#1A2A3A">Producer / agent</text>
<rect x="680" y="74" width="140" height="40" rx="6" fill="#FFFFFF" stroke="#2E5496"/><text x="750" y="99" fill="#1A2A3A">Review manager</text>
