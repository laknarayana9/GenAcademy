<text x="590" y="178" font-size="11" text-anchor="middle" fill="#46607A">pure rendering layer · httpx client</text>

<!-- API -->
<rect x="360" y="210" width="460" height="52" rx="8" fill="#1F4E79" stroke="#1F4E79"/>
<text x="590" y="232" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">FastAPI backend</text>
<text x="590" y="250" font-size="11" text-anchor="middle" fill="#CADDF0">/quote · /runs · /answers · /reviews · /health</text>

<!-- spine arrows -->
<line x1="590" y1="114" x2="590" y2="139" stroke="#1F4E79" stroke-width="1.6" marker-end="url(#aB)"/>
<line x1="590" y1="186" x2="590" y2="209" stroke="#1F4E79" stroke-width="1.6" marker-end="url(#aB)"/>
