<rect x="430" y="372" width="132" height="42" rx="6" fill="#FFFFFF" stroke="#2E5496"/><text x="496" y="398" font-size="12" fill="#1A2A3A">Enrichment</text>
<rect x="430" y="430" width="132" height="42" rx="6" fill="#FFFFFF" stroke="#2E5496"/><text x="496" y="456" font-size="12" fill="#1A2A3A">Retrieval</text>
<line x1="496" y1="414" x2="496" y2="429" stroke="#2E5496" stroke-width="1.4" marker-end="url(#aB)"/>
<text x="496" y="498" font-size="10" fill="#46607A">hazard / territory</text>
<text x="496" y="510" font-size="10" fill="#46607A">+ guideline chunks</text>

